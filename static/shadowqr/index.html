<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShadowQR - Premium Live QR Generator</title>
    <!-- Google Fonts - Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0813;
            --card-bg: rgba(25, 20, 40, 0.45);
            --card-border: rgba(255, 255, 255, 0.08);
            --accent-primary: #8b5cf6;
            --accent-secondary: #06b6d4;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --input-bg: rgba(15, 10, 25, 0.6);
            --shadow-glow: rgba(139, 92, 246, 0.15);
        }
        * { box-sizing: border-box; margin:0; padding:0; font-family: 'Outfit', sans-serif; }
        body{background:var(--bg-color);color:var(--text-main);min-height:100vh;}
        .container{max-width:1050px;margin:40px auto;background:var(--card-bg);border:1px solid var(--card-border);border-radius:16px;padding:24px;}
        .qr-card{background:white;border-radius:12px;padding:20px;display:flex;align-items:center;justify-content:center;width:320px;height:320px;margin: 0 auto}
        textarea{width:100%;min-height:120px;padding:12px;border-radius:8px;border:1px solid rgba(255,255,255,0.06);background:var(--input-bg);color:var(--text-main)}
        .controls{display:flex;gap:12px;margin-top:12px}
        .download-btn{display:block;margin:16px auto;padding:12px 20px;border-radius:10px;background:linear-gradient(135deg,var(--accent-primary),var(--accent-primary));color:#fff;border:none}
    </style>
</head>
<body>
    <div class="container">
        <h2 style="text-align:center;margin-bottom:12px;">ShadowQR · Live QR Generator</h2>
        <p style="text-align:center;color:var(--text-muted);">Type text or URL below and get a live QR. Customize dots, colors and add a small logo.</p>

        <div style="display:grid;grid-template-columns:1fr 380px;gap:20px;margin-top:20px;">
            <div>
                <label for="qr-text" style="display:block;margin-bottom:8px;color:var(--text-muted);">Text or URL</label>
                <textarea id="qr-text" placeholder="Type a link, message, or text here to generate instantly..."></textarea>

                <div class="controls">
                    <button id="style-square">Square</button>
                    <button id="style-round">Rounded</button>
                    <button id="level-m">M</button>
                    <button id="level-q">Q</button>
                </div>

                <div style="margin-top:12px;display:flex;gap:8px;align-items:center;">
                    <input type="color" id="color-fore" value="#0f0c20">
                    <input type="color" id="color-bg" value="#ffffff">
                    <input type="file" id="logo-input" accept="image/*">
                </div>

            </div>
            <div>
                <div class="qr-card">
                    <canvas id="qr-canvas" width="300" height="300"></canvas>
                </div>
                <button class="download-btn" id="download-btn">Download PNG</button>
            </div>
        </div>

    </div>

    <script src="{{ url_for('static', filename='js/qrcode.min.js') }}"></script>
    <script>
        const qrText = document.getElementById('qr-text');
        const canvas = document.getElementById('qr-canvas');
        const ctx = canvas.getContext('2d');
        const downloadBtn = document.getElementById('download-btn');
        const colorFore = document.getElementById('color-fore');
        const colorBg = document.getElementById('color-bg');
        const logoInput = document.getElementById('logo-input');
        let style = 'square';
        let level = 'M';
        let logoImg = null;

        function draw(qr) {
            const moduleCount = qr.getModuleCount();
            const size = 300;
            const cell = size / moduleCount;
            ctx.fillStyle = colorBg.value; ctx.fillRect(0,0,size,size);
            for (let r=0;r<moduleCount;r++){
                for (let c=0;c<moduleCount;c++){
                    if (qr.isDark(r,c)){
                        ctx.fillStyle = colorFore.value;
                        if (style==='round'){
                            ctx.beginPath();ctx.arc(c*cell+cell/2,r*cell+cell/2,cell*0.45,0,Math.PI*2);ctx.fill();
                        }else{ctx.fillRect(c*cell,r*cell,cell+0.5,cell+0.5)}
                    }
                }
            }
            if (logoImg){
                const logoSize = size*0.2; const x=(size-logoSize)/2; const y=(size-logoSize)/2; ctx.drawImage(logoImg,x,y,logoSize,logoSize);
            }
        }

        function generate(){
            const text = qrText.value.trim();
            if (!text) return;
            const qr = qrcode(0, level);
            qr.addData(text); qr.make(); draw(qr);
        }

        qrText.addEventListener('input', ()=>{clearTimeout(window.deb);window.deb=setTimeout(generate,60)});
        document.getElementById('style-square').addEventListener('click',()=>{style='square';generate()});
        document.getElementById('style-round').addEventListener('click',()=>{style='round';generate()});
        document.getElementById('level-m').addEventListener('click',()=>{level='M';generate()});
        document.getElementById('level-q').addEventListener('click',()=>{level='Q';generate()});

        downloadBtn.addEventListener('click',()=>{ const data = canvas.toDataURL('image/png').replace(/^data:image\/png;base64,/,""); window.downloadBlob && window.downloadBlob(data,'shadowqr_'+Date.now()+'.png','image/png')});

        logoInput.addEventListener('change',(e)=>{const f=e.target.files[0]; if(!f) return; const r=new FileReader(); r.onload=(ev)=>{ const img=new Image(); img.onload=()=>{logoImg=img; generate()}; img.src=ev.target.result}; r.readAsDataURL(f)});
    </script>
</body>
</html>
