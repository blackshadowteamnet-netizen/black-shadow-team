<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Black Shadow Team{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <link rel="icon" href="{{ url_for('static', filename='img/logo.png') }}">
</head>
<body>

<nav>
  <div class="nav-inner">
    <a href="{{ url_for('home') }}" class="nav-brand">
      <img src="{{ url_for('static', filename='img/logo.png') }}" alt="BST Logo">
      <div class="nav-brand-text">
        BLACK SHADOW TEAM
        <span>Est. 2026</span>
      </div>
    </a>
    <ul class="nav-links" id="navLinks">
      <li><a href="{{ url_for('home') }}" {% if request.endpoint=='home' %}class="active"{% endif %}>Home</a></li>
      <li><a href="{{ url_for('about') }}" {% if request.endpoint=='about' %}class="active"{% endif %}>About</a></li>
      <li><a href="{{ url_for('chatbot') }}" {% if request.endpoint=='chatbot' %}class="active"{% endif %}>AI Chat</a></li>
      <li><a href="{{ url_for('contact') }}" {% if request.endpoint=='contact' %}class="active"{% endif %}>Contact</a></li>
    </ul>
    <a href="{{ url_for('contact') }}" class="nav-cta">Get In Touch</a>
    <div class="hamburger" id="ham" onclick="toggleNav()">
      <span></span><span></span><span></span>
    </div>
  </div>
</nav>

<main style="flex:1;position:relative;z-index:1;">
  {% block content %}{% endblock %}
</main>

<footer>
  <div class="footer-inner">
    <div class="footer-brand">
      <img src="{{ url_for('static', filename='img/logo.png') }}" alt="Logo">
      <span>BLACK SHADOW TEAM</span>
    </div>
    <p class="footer-copy">© 2026 <span>Black Shadow Team</span>. All rights reserved.</p>
  </div>
</footer>

<script>
function toggleNav() {
  document.getElementById('navLinks').classList.toggle('open');
}
</script>
</body>
</html>
